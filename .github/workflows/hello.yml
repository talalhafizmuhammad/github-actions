name: Hello World

on:
  push:
  workflow_dispatch:

  jobs:
    greet:
      runs-on: ubuntu-latest

      steps:
        - name: Hello World
          run: echo "Hello from github actions"

        - name: show some info
          run: |
    echo "Github Repository: ${{ github.repository }}"
    echo "Github Actor: ${{ github.actor }}"
    echo "Github Event Name: ${{ github.event_name }}"
    echo "Branch: ${{ github.ref }}"